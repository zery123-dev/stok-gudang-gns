<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Stok - PT. Gula Nusantara Sukses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-slate-50 font-sans text-slate-900">
    <header class="bg-blue-800 text-white shadow-lg py-6 mb-8">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">PT. GULA NUSANTARA SUKSES</h1>
                <p class="text-blue-200 text-sm italic">Sistem Manajemen Stok Gudang Terintegrasi</p>
            </div>
            <i class="fas fa-warehouse text-4xl opacity-50"></i>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 sticky top-5">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                      <i class="fas fa-plus-circle text-blue-600"></i> Input Barang
                    </h2>
                    <div class="space-y-4">
                        <input type="hidden" id="editId">
                        <div>
                            <label class="text-xs font-semibold uppercase text-slate-500">Tanggal Masuk</label>
                            <input type="date" id="tanggalInput" class="w-full border p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="text-xs font-semibold uppercase text-slate-500">Nama Barang</label>
                            <input type="text" id="namaBarang" class="w-full border p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">

                        </div>

                        <div>

                            <label class="text-xs font-semibold uppercase text-slate-500">Jumlah Stok</label>

                            <input type="number" id="jumlah" class="w-full border p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">

                        </div>

                        <div>

                            <label class="text-xs font-semibold uppercase text-slate-500">Kategori</label>

                            <input type="text" id="kategori" class="w-full border p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">

                        </div>

                       

                        <button onclick="simpanBarang()" id="btnSimpan" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-md active:scale-95 transition">

                            SIMPAN DATA

                        </button>

                        <button onclick="resetForm(true)" id="btnBatal" class="w-full hidden bg-slate-200 text-slate-700 font-bold py-2 rounded-lg hover:bg-slate-300 transition">

                            BATAL EDIT

                        </button>

                    </div>

                </div>

            </div>



            <div class="lg:col-span-3">

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">

                    <div class="p-4 border-b border-slate-100 flex flex-col md:flex-row gap-4 justify-between bg-slate-50/50">

                        <div class="relative w-full md:w-72">

                            <i class="fas fa-search absolute left-3 top-3.5 text-slate-400"></i>

                           <input type="text" id="cariBarang" oninput="filterTabel()" placeholder="Cari nama barang..." class="pl-10 w-full border p-2.5 rounded-full text-sm outline-none focus:ring-2 focus:ring-blue-400 shadow-sm">

                        </div>

                        <div class="flex gap-2">

                            <button onclick="muatData()" class="p-2.5 bg-white border rounded-lg hover:bg-slate-100 shadow-sm"><i class="fas fa-sync-alt"></i></button>

                            <button onclick="exportExcel()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-lg hover:bg-emerald-700 shadow-md font-semibold text-sm flex items-center gap-2 transition">

                                <i class="fas fa-file-excel"></i> Export Excel

                            </button>

                        </div>

                    </div>



                    <div class="overflow-x-auto">

                        <table class="w-full text-left" id="tabelStok">

                            <thead class="bg-slate-100 text-slate-600 uppercase text-xs font-bold">

                                <tr>

                                    <th class="p-4">Nama Barang</th>

                                    <th class="p-4 text-center">Stok</th>

                                    <th class="p-4">Kategori</th>

                                    <th class="p-4 text-center">Tanggal</th>

                                    <th class="p-4 text-center">Aksi</th>

                                </tr>

                            </thead>

                            <tbody id="isiTabel" class="divide-y divide-slate-100"></tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </main>



    <script>

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxA8muBex5yxmkLmZRWUKSljnY4bueFQFt1KFtSFk3HOvgTh7SXF0dK_15cDdBOGCEYJw/exec";

        let SEMUA_DATA = [];



        // Fungsi bantu format tanggal ke YYYY-MM-DD

        function formatTanggalInput(dateStr) {

            const d = new Date(dateStr);

            const month = '' + (d.getMonth() + 1);

            const day = '' + d.getDate();

            const year = d.getFullYear();

            return [year, month.padStart(2, '0'), day.padStart(2, '0')].join('-');

        }



async function muatData() {

            const tbody = document.getElementById("isiTabel");

            tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center"><i class="fas fa-spinner fa-spin text-2xl text-blue-500"></i></td></tr>';

            try {

                const response = await fetch(WEB_APP_URL);

                const dataMentah = await response.json();

               

                // --- BAGIAN PENGURUTAN (A-Z) ---

                SEMUA_DATA = dataMentah.sort((a, b) => {

                    return a.nama.localeCompare(b.nama);

                });

                // -------------------------------



                renderTabel(SEMUA_DATA);

            } catch (error) {

                tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-500 italic">Gagal memuat database.</td></tr>';

            }

        }



        function renderTabel(data) {

            let html = "";

            data.forEach(item => {

                const tgl = item.tanggal ? new Date(item.tanggal).toLocaleDateString('id-ID') : "-";

                html += `<tr class="hover:bg-blue-50 transition group">

                    <td class="p-4 font-semibold text-slate-700">${item.nama}</td>

                    <td class="p-4 text-center"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-bold">${item.jumlah}</span></td>

                    <td class="p-4"><span class="text-xs bg-slate-200 px-2 py-1 rounded text-slate-600">${item.kategori}</span></td>

                    <td class="p-4 text-center text-xs text-slate-500">${tgl}</td>

                    <td class="p-4 text-center flex justify-center gap-2">

                        <button onclick="siapkanEdit(${item.id}, '${item.nama}', ${item.jumlah}, '${item.kategori}', '${item.tanggal}')" class="text-blue-500 hover:text-blue-700 p-2"><i class="fas fa-edit"></i></button>

                        <button onclick="hapusBarang(${item.id})" class="text-red-400 hover:text-red-600 p-2"><i class="fas fa-trash-alt"></i></button>

                    </td>

                </tr>`;

            });

            document.getElementById("isiTabel").innerHTML = html || '<tr><td colspan="5" class="p-5 text-center">Data tidak ditemukan.</td></tr>';

        }



        async function simpanBarang() {

            const id = document.getElementById("editId").value;

            const data = {

                action: id ? "edit" : "add",

                id: parseInt(id),

                nama: document.getElementById("namaBarang").value,

                jumlah: document.getElementById("jumlah").value,

                kategori: document.getElementById("kategori").value,

                tanggal: document.getElementById("tanggalInput").value

            };



            if(!data.nama || !data.jumlah || !data.tanggal) return alert("Lengkapi data!");



            document.getElementById("btnSimpan").innerText = "PROSES...";

            document.getElementById("btnSimpan").disabled = true;



            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(data) });

           

            // Perbaikan Utama: Tanggal tidak di-reset ke hari ini agar bisa input data kemarin berkali-kali

            resetForm(false);

            muatData();

        }



        function siapkanEdit(id, nama, jumlah, kategori, tanggal) {

            document.getElementById("editId").value = id;

            document.getElementById("namaBarang").value = nama;

            document.getElementById("jumlah").value = jumlah;

            document.getElementById("kategori").value = kategori;

           

            if(tanggal) {

                document.getElementById("tanggalInput").value = formatTanggalInput(tanggal);

            }



            document.getElementById("btnSimpan").innerText = "UPDATE DATA";

            document.getElementById("btnBatal").classList.remove("hidden");

            window.scrollTo({ top: 0, behavior: 'smooth' });

        }



        // Fungsi Reset Form yang lebih fleksibel

        function resetForm(resetTanggal = true) {

            document.getElementById("editId").value = "";

            document.getElementById("namaBarang").value = "";

            document.getElementById("jumlah").value = "";

            document.getElementById("kategori").value = "";

           

            // Jika resetTanggal true, maka kembali ke hari ini.

            // Jika false (setelah simpan), tanggal tetap pada pilihan terakhir Anda.

            if(resetTanggal) {

                document.getElementById("tanggalInput").value = formatTanggalInput(new Date());

            }



            document.getElementById("btnSimpan").innerText = "SIMPAN DATA";

            document.getElementById("btnSimpan").disabled = false;

            document.getElementById("btnBatal").classList.add("hidden");

        }



        async function hapusBarang(id) {

            if(!confirm("Hapus barang ini dari gudang?")) return;

            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({action: "delete", id: id}) });

            muatData();

        }



        function filterTabel() {

            const keyword = document.getElementById("cariBarang").value.toLowerCase();

            const hasilFilter = SEMUA_DATA.filter(item => item.nama.toLowerCase().includes(keyword));

            renderTabel(hasilFilter);

        }



        function exportExcel() {

            const judul = [["LAPORAN STOK GUDANG"], ["PT. GULA NUSANTARA SUKSES"], ["Tanggal Cetak: " + new Date().toLocaleDateString('id-ID')], []];

            const dataHeader = [["Nama Barang", "Jumlah Stok", "Kategori", "Tanggal"]];

            const dataBody = SEMUA_DATA.map(item => [item.nama, item.jumlah, item.kategori, item.tanggal ? new Date(item.tanggal).toLocaleDateString('id-ID') : "-"]);

            const ws = XLSX.utils.aoa_to_sheet([...judul, ...dataHeader, ...dataBody]);

            const wb = XLSX.utils.book_new();

            XLSX.utils.book_append_sheet(wb, ws, "Laporan");

            XLSX.writeFile(wb, "Laporan_Stok_" + new Date().getTime() + ".xlsx");

        }



        window.onload = () => {

            // Set pertama kali ke hari ini saat buka halaman

            document.getElementById("tanggalInput").value = formatTanggalInput(new Date());

            muatData();

        };

    </script>

</body>

</html>
