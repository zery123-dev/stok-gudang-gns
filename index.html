<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Stok - PT. Gula Nusantara Sukses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Style tambahan untuk scrollbar agar lebih rapi */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

<body class="bg-[#f8fafc] text-slate-900">
    <header class="bg-blue-900 text-white shadow-lg py-4 mb-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">PT. GULA NUSANTARA SUKSES</h1>
                <p class="text-blue-300 text-[10px] flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                    Dashboard Stok Real-Time
                </p>
            </div>
            <div class="text-right hidden md:block">
                <p id="jamDigital" class="text-xs font-mono text-blue-200"></p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-24">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-1">
                <div class="bg-white p-5 rounded-2xl shadow-xl shadow-blue-900/5 border border-slate-100 sticky top-5">
                    <h2 class="text-sm font-bold mb-4 flex items-center gap-2 text-blue-900 uppercase">
                        <i class="fas fa-edit text-blue-600"></i> Input Data
                    </h2>
                    <div class="space-y-3">
                        <input type="hidden" id="editId">
                        <div>
                            <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Tanggal</label>
                            <input type="date" id="tanggalInput" class="w-full border border-slate-200 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Status</label>
                            <select id="statusBarang" class="w-full border border-slate-200 p-2.5 rounded-xl text-sm font-semibold outline-none bg-white">
                                <option value="MASUK">➕ MASUK</option>
                                <option value="KELUAR">➖ KELUAR</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Barang</label>
                            <input type="text" id="namaBarang" placeholder="Nama barang..." class="w-full border border-slate-200 p-2.5 rounded-xl text-sm outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Jumlah</label>
                            <input type="number" id="jumlah" placeholder="0" class="w-full border border-slate-200 p-2.5 rounded-xl text-sm font-bold outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Kategori</label>
                            <input type="text" id="kategori" placeholder="Contoh: Logistik" class="w-full border border-slate-200 p-2.5 rounded-xl text-sm outline-none">
                        </div>
                        <button onclick="simpanBarang()" id="btnSimpan" class="w-full bg-blue-700 text-white font-bold py-3 rounded-xl hover:bg-blue-800 shadow-lg active:scale-95 transition-all mt-2 text-sm">
                            SIMPAN DATA
                        </button>
                        <button onclick="resetForm(true)" id="btnBatal" class="w-full hidden bg-slate-100 text-slate-500 font-bold py-2 rounded-xl text-xs border border-slate-200">
                            BATAL
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-3 justify-between items-center">
                    <div class="relative w-full md:w-80">
                        <i class="fas fa-search absolute left-3 top-3 text-slate-300 text-xs"></i>
                        <input type="text" id="cariBarang" oninput="filterTabel()" placeholder="Cari nama barang..." class="pl-9 w-full border border-slate-100 p-2 rounded-lg text-xs outline-none bg-slate-50/50 focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="muatData()" class="flex-1 md:flex-none px-3 py-2 bg-white border border-slate-200 rounded-lg text-slate-500 text-xs hover:bg-slate-50">
                            <i class="fas fa-sync-alt mr-1"></i> Refresh
                        </button>
                        <button onclick="exportExcel()" class="flex-1 md:flex-none bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-xs flex items-center justify-center gap-2 hover:bg-emerald-700 shadow-md">
                            <i class="fas fa-file-excel"></i> Export Ringkasan
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
                    <div class="p-4 bg-slate-800 text-white flex justify-between items-center">
                        <h3 class="text-xs font-bold uppercase tracking-wider flex items-center gap-2">
                            <i class="fas fa-boxes text-emerald-400"></i> Ringkasan Stok Saat Ini
                        </h3>
                        <div class="flex gap-4 text-[10px] font-bold">
                            <span class="text-emerald-400">MASUK: <span id="totalMasuk">0</span></span>
                            <span class="text-red-400">KELUAR: <span id="totalKeluar">0</span></span>
                            <span class="text-blue-400 underline">TOTAL: <span id="totalSisa">0</span></span>
                        </div>
                    </div>
                    <div class="overflow-x-auto max-h-80 overflow-y-auto custom-scroll">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-50 text-slate-400 sticky top-0 uppercase font-black border-b border-slate-100">
                                <tr>
                                    <th class="p-4">Nama Barang</th>
                                    <th class="p-4 text-center">Total Masuk</th>
                                    <th class="p-4 text-center">Total Keluar</th>
                                    <th class="p-4 text-center">Sisa Stok</th>
                                </tr>
                            </thead>
                            <tbody id="isiRingkasan" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
                    <div class="p-3 bg-slate-50 border-b border-slate-100">
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Riwayat Transaksi Terakhir</h4>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-white text-slate-400 uppercase font-black border-b border-slate-100">
                                <tr>
                                    <th class="p-4">Tanggal</th>
                                    <th class="p-4">Nama Barang</th>
                                    <th class="p-4 text-center text-emerald-600">In</th>
                                    <th class="p-4 text-center text-red-500">Out</th>
                                    <th class="p-4 text-center text-blue-600">Saldo</th>
                                    <th class="p-4 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="isiTabel" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxA8muBex5yxmkLmZRWUKSljnY4bueFQFt1KFtSFk3HOvgTh7SXF0dK_15cDdBOGCEYJw/exec";
    let SEMUA_DATA = [];

    setInterval(() => {
        document.getElementById('jamDigital').innerText = new Date().toLocaleString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }, 1000);

    function formatTanggalInput(dateStr) {
        const d = new Date(dateStr);
        return [d.getFullYear(), (''+(d.getMonth()+1)).padStart(2,'0'), (''+d.getDate()).padStart(2,'0')].join('-');
    }

    async function muatData() {
        const tbody = document.getElementById("isiTabel");
        tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-400 italic">Memproses data...</td></tr>';
        try {
            const response = await fetch(WEB_APP_URL);
            const dataMentah = await response.json();
            SEMUA_DATA = dataMentah.sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
            renderTabel(SEMUA_DATA);
            hitungTotal(SEMUA_DATA);
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-500">Gagal Memuat.</td></tr>';
        }
    }

    function hitungTotal(data) {
        let masuk = 0, keluar = 0;
        data.forEach(i => {
            if(i.jumlah > 0) masuk += i.jumlah;
            else keluar += Math.abs(i.jumlah);
        });
        document.getElementById("totalMasuk").innerText = masuk;
        document.getElementById("totalKeluar").innerText = keluar;
        document.getElementById("totalSisa").innerText = masuk - keluar;
    }

    function renderTabel(data) {
        let htmlRiwayat = "";
        let ringkasanData = {}; 
        let saldoPerBarang = {}; 

        let dataDenganSaldo = data.map(item => {
            const nama = item.nama;
            if (!saldoPerBarang[nama]) {
                saldoPerBarang[nama] = 0;
                ringkasanData[nama] = { masuk: 0, keluar: 0, sisa: 0 };
            }
            saldoPerBarang[nama] += item.jumlah;
            if (item.jumlah > 0) ringkasanData[nama].masuk += item.jumlah;
            else ringkasanData[nama].keluar += Math.abs(item.jumlah);
            ringkasanData[nama].sisa = saldoPerBarang[nama];
            return { ...item, sisaBerjalan: saldoPerBarang[nama] };
        });

        [...dataDenganSaldo].reverse().forEach(item => {
            const tgl = item.tanggal ? new Date(item.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'short'}) : "-";
            htmlRiwayat += `
                <tr class="hover:bg-slate-50 group">
                    <td class="p-4 text-slate-400">${tgl}</td>
                    <td class="p-4 font-bold text-slate-700">${item.nama}</td>
                    <td class="p-4 text-center text-emerald-600 font-semibold">${item.jumlah > 0 ? item.jumlah : '-'}</td>
                    <td class="p-4 text-center text-red-500 font-semibold">${item.jumlah < 0 ? Math.abs(item.jumlah) : '-'}</td>
                    <td class="p-4 text-center font-black text-blue-600">${item.sisaBerjalan}</td>
                    <td class="p-4 text-center">
                        <div class="flex justify-center gap-2 opacity-0 group-hover:opacity-100">
                            <button onclick="siapkanEdit(${item.id}, '${item.nama}', ${item.jumlah}, '${item.kategori}', '${item.tanggal}')" class="text-blue-500"><i class="fas fa-edit"></i></button>
                            <button onclick="hapusBarang(${item.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>`;
        });
        document.getElementById("isiTabel").innerHTML = htmlRiwayat || '<tr><td colspan="6" class="p-10 text-center text-slate-300">Belum ada riwayat.</td></tr>';

        let htmlRingkasan = "";
        for (let nama in ringkasanData) {
            htmlRingkasan += `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 font-extrabold text-slate-800">${nama}</td>
                    <td class="p-4 text-center text-emerald-600">${ringkasanData[nama].masuk}</td>
                    <td class="p-4 text-center text-red-500">${ringkasanData[nama].keluar}</td>
                    <td class="p-4 text-center">
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full font-black">${ringkasanData[nama].sisa}</span>
                    </td>
                </tr>`;
        }
        document.getElementById("isiRingkasan").innerHTML = htmlRingkasan || '<tr><td colspan="4" class="p-10 text-center text-slate-400 italic">Belum ada stok barang.</td></tr>';
    }

    async function simpanBarang() {
        const id = document.getElementById("editId").value;
        const status = document.getElementById("statusBarang").value;
        let qty = parseInt(document.getElementById("jumlah").value);
        if (status === "KELUAR") qty = -Math.abs(qty);
        else qty = Math.abs(qty);

        const data = {
            action: id ? "edit" : "add",
            id: id ? parseInt(id) : null,
            nama: document.getElementById("namaBarang").value.trim(),
            jumlah: qty,
            kategori: document.getElementById("kategori").value.trim(),
            tanggal: document.getElementById("tanggalInput").value
        };

        if(!data.nama || isNaN(qty) || !data.tanggal) return alert("⚠️ Mohon isi semua kolom!");
        document.getElementById("btnSimpan").innerText = "PROSES...";
        document.getElementById("btnSimpan").disabled = true;
        
        try {
            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(data) });
            resetForm(false);
            muatData();
        } catch (error) {
            alert("Terjadi kesalahan!");
            document.getElementById("btnSimpan").disabled = false;
        }
    }

    function siapkanEdit(id, nama, jumlah, kategori, tanggal) {
        document.getElementById("editId").value = id;
        document.getElementById("namaBarang").value = nama;
        document.getElementById("jumlah").value = Math.abs(jumlah);
        document.getElementById("kategori").value = kategori;
        document.getElementById("statusBarang").value = jumlah > 0 ? "MASUK" : "KELUAR";
        if(tanggal) document.getElementById("tanggalInput").value = formatTanggalInput(tanggal);
        document.getElementById("btnSimpan").innerText = "UPDATE DATA";
        document.getElementById("btnBatal").classList.remove("hidden");
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm(resetTanggal = true) {
        document.getElementById("editId").value = "";
        document.getElementById("namaBarang").value = "";
        document.getElementById("jumlah").value = "";
        document.getElementById("kategori").value = "";
        if(resetTanggal) document.getElementById("tanggalInput").value = formatTanggalInput(new Date());
        document.getElementById("btnSimpan").innerText = "SIMPAN DATA";
        document.getElementById("btnSimpan").disabled = false;
        document.getElementById("btnBatal").classList.add("hidden");
    }

    async function hapusBarang(id) {
        if(!confirm("Hapus data ini?")) return;
        await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({action: "delete", id: id}) });
        muatData();
    }

    function filterTabel() {
        const keyword = document.getElementById("cariBarang").value.toLowerCase();
        const hasilFilter = SEMUA_DATA.filter(item => item.nama.toLowerCase().includes(keyword));
        renderTabel(hasilFilter);
    }

    function exportExcel() {
        let ringkasanData = {};
        SEMUA_DATA.forEach(item => {
            const nama = item.nama;
            if (!ringkasanData[nama]) {
                ringkasanData[nama] = { masuk: 0, keluar: 0, sisa: 0, kategori: item.kategori || "UMUM" };
            }
            if (item.jumlah > 0) ringkasanData[nama].masuk += item.jumlah;
            else ringkasanData[nama].keluar += Math.abs(item.jumlah);
            ringkasanData[nama].sisa += item.jumlah;
        });

        const dataHeader = [["Nama Barang", "Total Masuk", "Total Keluar", "Sisa Stok Akhir", "Kategori"]];
        const dataBody = Object.keys(ringkasanData).map(nama => [
            nama, 
            ringkasanData[nama].masuk, 
            ringkasanData[nama].keluar, 
            ringkasanData[nama].sisa, 
            ringkasanData[nama].kategori
        ]);

        const ws = XLSX.utils.aoa_to_sheet([
            ["LAPORAN RINGKASAN STOK - PT. GNS"],
            ["Tanggal Cetak: " + new Date().toLocaleString('id-ID')],
            [],
            ...dataHeader, 
            ...dataBody
        ]);

        ws['!cols'] = [{ wch: 40 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 20 }];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Ringkasan Stok");
        XLSX.writeFile(wb, "Ringkasan_Stok_GNS_" + new Date().toISOString().slice(0,10) + ".xlsx");
    }

    window.onload = () => {
        document.getElementById("tanggalInput").value = formatTanggalInput(new Date());
        muatData();
    };
</script>
</body>
</html>
